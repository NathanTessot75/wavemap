      let busy = false;
      launchBtn.addEventListener('click', async () => {
        if (!hasContent() || busy) return;
        busy = true;
        const labelEl = launchBtn.querySelector('.ad-launch-label');
        const originalLabel = labelEl.textContent;
        launchBtn.disabled = true;
        launchBtn.classList.remove('ad-ready');
        launchBtn.getAnimations().forEach(a => a.cancel());

        const cancelLaunch = () => { labelEl.textContent = originalLabel; busy = false; updateLaunch(); };
        try {
          if (userVideo) {
            // ===== Mode VIDÉO =====
            labelEl.textContent = t('verifying');
            setStatus(t('videoAnalysis'), 'info');
            let frames = [];
            try { frames = await extractFrames(userVideo, [0.05, 0.5]); } catch (e) {}
            for (const frame of frames) {
              const r = await fetch('/api/moderate', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: frame }),
              });
              const m = await r.json();
              if (!r.ok) throw new Error(m.message || 'Échec de la vérification');
              if (m.flagged) {
                setStatus(t('videoRejected'), 'error');
                cancelLaunch();
                return;
              }
            }
            // mémorise la vidéo (IndexedDB) + marqueur léger (localStorage)
            await idbVideo('put', userVideo);
            localStorage.setItem('wavemap_pending_ad', JSON.stringify({ kind: 'video', offer: chosenOffer }));
          } else {
            // ===== Mode IMAGE =====
            const image = exportComposite();
            labelEl.textContent = t('verifying');
            setStatus(t('imageAnalysis'), 'info');
            const modRes = await fetch('/api/moderate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image }),
            });
            const mod = await modRes.json();
            if (!modRes.ok) throw new Error(mod.message || 'Échec de la vérification');
            if (mod.flagged) {
              setStatus(t('imageRejected'), 'error');
              cancelLaunch();
              return;
            }
            localStorage.setItem('wavemap_pending_ad', JSON.stringify({ kind: 'image', image, offer: chosenOffer }));
          }

          // ===== Upload du média sur le serveur (avant paiement) =====
          labelEl.textContent = t('uploading');
          setStatus(t('uploading'), 'info');
          const up = userVideo
            ? await uploadMedia(userVideo, 'ad.webm')
            : await uploadMedia(await (await fetch(exportComposite())).blob(), 'ad.png');

          // ===== Paiement =====
          labelEl.textContent = t('redirectPay');
          setStatus(t('openPay'), 'info');
          const sessRes = await fetch('/api/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ offer: chosenOffer, mediaId: up.mediaId, type: up.type }),
          });
          const sess = await sessRes.json();
          if (!sessRes.ok || !sess.url) throw new Error(sess.message || 'Impossible de créer la session de paiement');
          window.location.href = sess.url;
        } catch (e) {
          setStatus(t('errorPfx') + e.message, 'error');
          labelEl.textContent = originalLabel;
          busy = false;
          updateLaunch();
        }
      });

      // Restaure un visuel (image composite aplatie) dans le canvas de dessin
      function restoreDrawing(dataUrl) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            imgCtx.clearRect(0, 0, imgLayer.width, imgLayer.height);
            drawCtx.clearRect(0, 0, drawLayer.width, drawLayer.height);
            drawCtx.drawImage(img, 0, 0, drawLayer.width, drawLayer.height);
            hasDrawing = true;
            updateLaunch();
            resolve();
          };
          img.onerror = resolve;
          img.src = dataUrl;
        });
      }

      // Retour depuis Stripe Checkout
      (async function handleCheckoutReturn() {
        const params = new URLSearchParams(location.search);
        const result = params.get('checkout');
        if (!result) return;
        const cleanUrl = location.origin + location.pathname;
        const pending = JSON.parse(localStorage.getItem('wavemap_pending_ad') || 'null');
        const isVideo = pending && pending.kind === 'video';

        // Restaure le contenu en attente dans la modale (pour annulation / échec)
        async function restorePending() {
          if (!pending) return;
          if (isVideo) {
            try { const blob = await idbVideo('get'); if (blob) enterVideoMode(blob); } catch (e) {}
          } else if (pending.image) {
            await restoreDrawing(pending.image);
          }
        }

        if (result === 'cancel') {
          history.replaceState(null, '', cleanUrl);
          open();
          await restorePending();
          setStatus(t('payCancelled'), 'info');
          return;
        }
        if (result === 'success') {
          const sessionId = params.get('session_id');
          history.replaceState(null, '', cleanUrl);
          try {
            const res = await fetch('/api/verify-session?session_id=' + encodeURIComponent(sessionId));
            const data = await res.json();
            if (data.paid) {
              // La pub est désormais gérée côté serveur et diffusée à TOUS via le polling.
              localStorage.removeItem('wavemap_pending_ad');
              try { await idbVideo('del'); } catch (e) {}
              const pos = data.queuePosition || 0;
              let msg;
              if (pos === 0)      msg = t('payOnAir');
              else if (pos > 10)  msg = t('payQueued', { pos });
              else                msg = t('paySoon');
              showToast(msg);
            } else {
              open();
              await restorePending();
              setStatus(t('payFailed'), 'error');
            }
          } catch (e) {
            console.error('[checkout-return]', e);
            open();
            await restorePending();
            setStatus(t('payError'), 'error');
          }
        }
      })();
    })();

    /* ============== GRILLE DE POINTS (fond) ============== */
    const dotsCanvas = document.getElementById('dots');
    const dctx = dotsCanvas.getContext('2d');
    let dotsDpr = 1;
    function sizeDots() {
      dotsDpr = Math.min(window.devicePixelRatio || 1, 2);
      dotsCanvas.width = Math.round(innerWidth * dotsDpr);
      dotsCanvas.height = Math.round(innerHeight * dotsDpr);
      dotsCanvas.style.width = innerWidth + 'px';
      dotsCanvas.style.height = innerHeight + 'px';
    }
    sizeDots();
    window.addEventListener('resize', sizeDots);

    const DOTS_SPEED = 1.1;     // degrés/seconde
    const DOT_SPACING = 34;     // espacement de la grille (px)
    const DOT_RADIUS = 1.5;     // rayon des points (px)
    const DOT_CURVE = 9e-7;     // courbure (effet bombé, centré)
    let dotsAngle = 0;
    let dotsLast = performance.now();

    // Constellations (visibles uniquement la nuit / mode sombre)
    const strokes = [];          // plusieurs constellations ; chacune = tableau de points [i, j]
    const CONNECT_DIST = 5;      // distance max (cases de grille) pour relier au point précédent

    // Position écran d'un point de grille (i, j) avec la courbure + rotation courantes
    function dotPos(i, j, ca, sa, cx, cy) {
      let x = i * DOT_SPACING, y = j * DOT_SPACING;
      const f = 1 + DOT_CURVE * (x * x + y * y);
      x *= f; y *= f;
      return [cx + x * ca - y * sa, cy + x * sa + y * ca];
    }

    function drawDots(now) {
      const dt = (now - dotsLast) / 1000; dotsLast = now;
      dotsAngle += DOTS_SPEED * dt * Math.PI / 180;
      const W = innerWidth, H = innerHeight;
      dctx.setTransform(dotsDpr, 0, 0, dotsDpr, 0, 0);
      dctx.clearRect(0, 0, W, H);
      const cx = W / 2, cy = H / 2;             // centre de l'écran -> bombé centré et symétrique
      const reach = Math.hypot(W, H) * 0.85;
      const n = Math.ceil(reach / DOT_SPACING);
      const ca = Math.cos(dotsAngle), sa = Math.sin(dotsAngle);
      const isDark = document.body.classList.contains('dark');
      dctx.fillStyle = isDark ? 'rgba(255,255,255,0.22)' : 'rgba(20,20,45,0.15)';
      for (let i = -n; i <= n; i++) {
        for (let j = -n; j <= n; j++) {
          let x = i * DOT_SPACING, y = j * DOT_SPACING;
          const f = 1 + DOT_CURVE * (x * x + y * y);  // bombé arrondi (barrel)
          x *= f; y *= f;
          const px = cx + x * ca - y * sa;
          const py = cy + x * sa + y * ca;
          if (px < -4 || px > W + 4 || py < -4 || py > H + 4) continue;
          dctx.beginPath();
          dctx.arc(px, py, DOT_RADIUS, 0, 6.2832);
          dctx.fill();
        }
      }

      // Constellations : dessinées seulement la nuit (rien en mode clair)
      if (isDark && strokes.length) {
        const t = now * 0.003;
        const drawPath = (st) => {
          dctx.beginPath();
          st.forEach((d, k) => {
            const p = dotPos(d[0], d[1], ca, sa, cx, cy);
            k ? dctx.lineTo(p[0], p[1]) : dctx.moveTo(p[0], p[1]);
          });
          dctx.stroke();
        };

        // --- Liens lumineux : halo bleuté flou + trait fin net ---
        dctx.save();
        dctx.lineCap = 'round';
        dctx.lineJoin = 'round';
        dctx.shadowColor = 'rgba(150,200,255,0.9)';
        dctx.shadowBlur = 9;
        dctx.strokeStyle = 'rgba(190,220,255,0.45)';
        dctx.lineWidth = 1.6;
        for (const st of strokes) if (st.length > 1) drawPath(st);
        dctx.shadowBlur = 0;
        dctx.strokeStyle = 'rgba(255,255,255,0.55)';
        dctx.lineWidth = 0.7;
        for (const st of strokes) if (st.length > 1) drawPath(st);
        dctx.restore();

        // --- Étoiles scintillantes (halo + pulsation) ---
        dctx.save();
        for (const st of strokes) for (const d of st) {
          const p = dotPos(d[0], d[1], ca, sa, cx, cy);
          const tw = 0.5 + 0.5 * Math.sin(t + d[0] * 12.9898 + d[1] * 78.233); // 0..1
          dctx.shadowColor = 'rgba(180,215,255,0.95)';
          dctx.shadowBlur = 6 + 7 * tw;
          dctx.fillStyle = 'rgba(255,255,255,' + (0.85 + 0.15 * tw) + ')';
          dctx.beginPath();
          dctx.arc(p[0], p[1], 2.1 + 1.1 * tw, 0, 6.2832);
          dctx.fill();
        }
        dctx.restore();
      }

      requestAnimationFrame(drawDots);
    }
    requestAnimationFrame(drawDots);

    // Trouve le point de grille le plus proche d'un clic (dans un seuil)
    function findDotAt(clickX, clickY) {
      const W = innerWidth, H = innerHeight, cx = W / 2, cy = H / 2;
      const ca = Math.cos(dotsAngle), sa = Math.sin(dotsAngle);
      const reach = Math.hypot(W, H) * 0.85;
      const n = Math.ceil(reach / DOT_SPACING);
      let best = null, bestD = 20 * 20;   // seuil 20px
      for (let i = -n; i <= n; i++) {
        for (let j = -n; j <= n; j++) {
          const [px, py] = dotPos(i, j, ca, sa, cx, cy);
          if (px < -4 || px > W + 4 || py < -4 || py > H + 4) continue;
          const dx = px - clickX, dy = py - clickY, d = dx * dx + dy * dy;
          if (d < bestD) { bestD = d; best = [i, j]; }
        }
      }
      return best;
    }

    // Un point écran est "dans l'espace" si l'aller-retour projection le déplace
    // (hors du globe, unproject le ramène sur le limbe -> erreur non nulle)
    function isSpace(x, y) {
      const ll = map.unproject([x, y]);
      const p = map.project(ll);
      return Math.hypot(p.x - x, p.y - y) > 6;
    }

    function addOrToggleDot(i, j) {
      // déjà sélectionnée ? -> on la retire
      for (let s = 0; s < strokes.length; s++) {
        const k = strokes[s].findIndex(p => p[0] === i && p[1] === j);
        if (k >= 0) {
          strokes[s].splice(k, 1);
          if (!strokes[s].length) strokes.splice(s, 1);
          return;
        }
      }
      // sinon : reliée au dernier point si proche, sinon NOUVELLE constellation
      const cur = strokes[strokes.length - 1];
      if (cur && cur.length) {
        const last = cur[cur.length - 1];
        if (Math.hypot(i - last[0], j - last[1]) <= CONNECT_DIST) { cur.push([i, j]); return; }
      }
      strokes.push([[i, j]]);
    }

    // Clic dans l'espace (la nuit) -> ajoute/relie un point ; re-clic -> le retire
    map.on('click', (e) => {
      if (!dark) return;                                  // visible seulement la nuit
      if (!isSpace(e.point.x, e.point.y)) return;         // clic sur le globe -> on ignore
      const d = findDotAt(e.point.x, e.point.y);
      if (d) addOrToggleDot(d[0], d[1]);
    });

    /* ================= PULSE (onde autour du pays) ================= */
    let pulseActive = false;
    function showPulse(lngLat) {
      if (!lngLat || !map.getSource('pulse')) { hidePulse(); return; }
      map.getSource('pulse').setData({
        type: 'FeatureCollection',
        features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: [lngLat.lng, lngLat.lat] }, properties: {} }]
      });
      pulseActive = true;
    }
    function hidePulse() {
      pulseActive = false;
      if (map.getSource('pulse')) map.getSource('pulse').setData({ type: 'FeatureCollection', features: [] });
    }
    function pulseRing(id, t) {            // t: 0..1
      if (!map.getLayer(id)) return;
      const env = Math.sin(t * Math.PI);  // fondu : 0 au départ, max au milieu, 0 à la fin
      map.setPaintProperty(id, 'circle-radius', 6 + t * 46);
      map.setPaintProperty(id, 'circle-stroke-opacity', 0.7 * env);
      map.setPaintProperty(id, 'circle-opacity', 0.12 * env);
    }
    const PULSE_PERIOD = 2200;
    function pulseFrame(now) {
      if (pulseActive) {
        pulseRing('pulse-1', (now % PULSE_PERIOD) / PULSE_PERIOD);
        pulseRing('pulse-2', ((now + PULSE_PERIOD / 2) % PULSE_PERIOD) / PULSE_PERIOD);
      }
      requestAnimationFrame(pulseFrame);
    }
    requestAnimationFrame(pulseFrame);

    /* ================= RADIO ================= */
    const RB_MIRRORS = [
      'https://de1.api.radio-browser.info',
      'https://de2.api.radio-browser.info',
      'https://nl1.api.radio-browser.info',
      'https://at1.api.radio-browser.info',
      'https://fi1.api.radio-browser.info'
    ];

    const audio = document.getElementById('audio');
    let hls = null;
    let stations = [];      // candidats filtrés (du plus écouté au moins)
    let idx = 0;
    let errStreak = 0;
    let currentCountry = '';
    let currentCountryName = '';
    let currentLngLat = null;
    let currentStation = null;
    let favorites = [];

    // UI refs
    const els = {
      player: document.getElementById('player'),
      country: document.getElementById('plCountry'),
      name: document.getElementById('plName'),
      station: document.getElementById('plStation'),
      status: document.getElementById('plStatus'),
      fav: document.getElementById('plFav'),
      play: document.getElementById('plPlay'),
      playIcon: document.getElementById('plPlayIcon'),
      prev: document.getElementById('plPrev'),
      next: document.getElementById('plNext'),
      count: document.getElementById('plCount'),
      vol: document.getElementById('plVol'),
      mute: document.getElementById('plMute'),
      volIconPath: document.getElementById('plVolIcon'),
      close: document.getElementById('plClose'),
      star: document.getElementById('plStar'),
      diceBtn: document.getElementById('diceBtn'),
      searchInput: document.getElementById('searchInput'),
      searchPanel: document.getElementById('searchPanel'),
      searchList: document.getElementById('searchList'),
      favToggle: document.getElementById('favToggle'),
      favPanel: document.getElementById('favPanel'),
      favList: document.getElementById('favList'),
      favCount: document.getElementById('favCount')
    };
    const ICON_PLAY = 'M8 5v14l11-7z';
    const ICON_PAUSE = 'M6 5h4v14H6zM14 5h4v14h-4z';

    function setStatus(txt, isErr) {
      els.status.innerHTML = txt;
      els.status.classList.toggle('err', !!isErr);
    }

    async function fetchStations(cc) {
      const q = `/json/stations/bycountrycodeexact/${cc}?hidebroken=true&order=clickcount&reverse=true&limit=60`;
      for (const base of RB_MIRRORS) {
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 6000);
          const r = await fetch(base + q, { signal: ctrl.signal });
          clearTimeout(t);
          if (r.ok) return await r.json();
        } catch (e) { /* essaie le miroir suivant */ }
      }
      throw new Error('Serveurs radio injoignables');
    }

    function isHls(s) { return s.hls === 1 || /\.m3u8(\?|$)/i.test(s.url_resolved || ''); }

    function cleanupHls() { if (hls) { try { hls.destroy(); } catch (e) {} hls = null; } }

    function loadAndPlay(station) {
      cleanupHls();
      clearBufferTimer();
      currentStation = station;
      updateFavButton();
      const url = station.url_resolved;
      els.station.textContent = station.name || 'Station';
      // favicon
      if (station.favicon) {
        els.fav.innerHTML = '';
        const img = new Image();
        img.style.cssText = 'width:100%;height:100%;border-radius:12px;object-fit:cover';
        img.onerror = () => { els.fav.innerHTML = '📻'; };
        img.src = station.favicon;
        els.fav.appendChild(img);
      } else {
        els.fav.innerHTML = '📻';
      }
      setStatus('<span class="spinner"></span> ' + t('connecting'));

      if (isHls(station) && window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          startFragPrefetch: true,      // précharge le 1er segment -> démarrage plus rapide
          liveSyncDurationCount: 2,     // se cale près du direct (moins d'attente initiale)
          manifestLoadingTimeOut: 8000,
          fragLoadingTimeOut: 12000
        });
        hls.loadSource(url);
        hls.attachMedia(audio);
        hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(() => {}));
        hls.on(Hls.Events.ERROR, (_e, data) => { if (data.fatal) onStreamError(); });
      } else {
        audio.src = url;
        audio.play().catch(() => {});
      }
    }

    function updateCount() {
      els.count.textContent = stations.length ? `${idx + 1}/${stations.length}` : '';
    }

    function playIndex() {
      if (idx >= stations.length) { setStatus(t('noStation'), true); return; }
      updateCount();
      loadAndPlay(stations[idx]);
    }

    function onStreamError() {
      errStreak++;
      if (errStreak > 6) { setStatus(t('noStream'), true); return; }
      idx++;
      if (idx >= stations.length) idx = 0;
      if (errStreak <= stations.length) { setStatus('<span class="spinner"></span> ' + t('nextSt')); playIndex(); }
      else setStatus(t('noStream'), true);
    }

    function nextStation() {
      if (!stations.length) return;
      errStreak = 0;
      idx = (idx + 1) % stations.length;
      playIndex();
    }

    function prevStation() {
      if (!stations.length) return;
      errStreak = 0;
      idx = (idx - 1 + stations.length) % stations.length;
      playIndex();
    }

    async function selectCountry(cc, name, lngLat, preferUuid) {
      currentCountry = cc;
      currentCountryName = name;
      currentLngLat = lngLat || null;
      radioActive = true;
      errStreak = 0; idx = 0; stations = [];
      els.name.innerHTML = `${flagEmoji(cc)} ${name}`;
      els.count.textContent = '';
      els.station.textContent = '—';
      els.fav.innerHTML = '📻';
      setStatus('<span class="spinner"></span> ' + t('searchRadios'));
      els.player.classList.add('show');
      map.setFilter('countries-hl', ['==', ['get', 'ISO_A2_EH'], cc]);
      showPulse(lngLat);
      // Recentre le pays dans le dôme visible (le centre de la carte est en bas de l'écran)
      if (lngLat) map.easeTo({ center: lngLat, offset: [0, -window.innerHeight * 0.55], duration: 1100 });

      let list;
      try { list = await fetchStations(cc); }
      catch (e) { setStatus(e.message + t('retry'), true); return false; }

      // Si l'utilisateur a cliqué ailleurs entre-temps, on abandonne
      if (currentCountry !== cc) return false;

      const httpsOnly = location.protocol === 'https:';
      stations = list
        .filter(s => s.url_resolved && s.lastcheckok === 1)
        .filter(s => !httpsOnly || s.url_resolved.startsWith('https'))
        // les plus écoutées / votées d'abord
        .sort((a, b) => (b.votes + b.clickcount) - (a.votes + a.clickcount));

      if (!stations.length) { setStatus(t('noRadio'), true); return false; }
      // Si on rouvre un favori précis, on saute à cette station
      if (preferUuid) {
        const pi = stations.findIndex(s => s.stationuuid === preferUuid);
        if (pi >= 0) idx = pi;
      }
      playIndex();
      return true;
    }

    function onCountryClick(e) {
      // En mode globe, un clic dans l'espace "touche" quand même le calque des pays
      // (la projection le rabat sur le globe) -> on ignore si le clic est hors du globe.
      if (isSpace(e.point.x, e.point.y)) return;
      const f = e.features && e.features[0];
      if (!f) return;
      const p = f.properties;
      const cc = p.ISO_A2_EH;
      const name = p.NAME_EN || p.NAME || p.ADMIN || 'Pays';
      if (!cc || cc === '-99') {
        radioActive = true; els.player.classList.add('show');
        els.name.textContent = name; els.count.textContent = ''; els.station.textContent = '—';
        setStatus(t('noCC'), true); return;
      }
      // Centre du pays (point intérieur) plutôt que l'endroit cliqué
      const c = countriesData.find(d => d.ISO_A2_EH === cc);
      const ll = c ? { lng: c.LABEL_X, lat: c.LABEL_Y } : e.lngLat;
      selectCountry(cc, name, ll);
    }

    // Pays au hasard : vole dessus et lance sa radio (réessaie si aucune radio)
    async function randomCountry() {
      if (!countriesData.length) return;
      els.diceBtn.classList.remove('rolling');
      void els.diceBtn.offsetWidth;          // relance l'animation
      els.diceBtn.classList.add('rolling');
      setTimeout(() => els.diceBtn.classList.remove('rolling'), 520);
      const tried = new Set();
      for (let attempt = 0; attempt < 8 && tried.size < countriesData.length; attempt++) {
        let p;
        do { p = countriesData[Math.floor(Math.random() * countriesData.length)]; } while (tried.has(p.ISO_A2_EH));
        tried.add(p.ISO_A2_EH);
        const ok = await selectCountry(p.ISO_A2_EH, p.NAME_EN || p.NAME, { lng: p.LABEL_X, lat: p.LABEL_Y });
        if (ok) return;
      }
    }

    // Drapeau emoji depuis le code ISO
    function flagEmoji(cc) {
      if (!cc || cc.length !== 2) return '🏳️';
      return String.fromCodePoint(...[...cc.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
    }

    /* ---------- contrôles audio ---------- */
    function updatePlayIcon() { els.playIcon.setAttribute('d', audio.paused ? ICON_PLAY : ICON_PAUSE); }
    // N'affiche « Mise en mémoire… » que si le buffer dure > 450ms (sinon ça clignote pour rien)
    let bufferTimer = null;
    function clearBufferTimer() { if (bufferTimer) { clearTimeout(bufferTimer); bufferTimer = null; } }
    audio.addEventListener('play', updatePlayIcon);
    audio.addEventListener('playing', () => { clearBufferTimer(); errStreak = 0; setStatus('<span class="live-txt">' + t('live') + '</span>'); updatePlayIcon(); });
    audio.addEventListener('pause', updatePlayIcon);
    audio.addEventListener('ended', updatePlayIcon);
    audio.addEventListener('waiting', () => {
      clearBufferTimer();
      bufferTimer = setTimeout(() => setStatus('<span class="spinner"></span> ' + t('buffering')), 450);
    });
    audio.addEventListener('error', () => { if (audio.src) onStreamError(); });
    audio.volume = parseFloat(els.vol.value);

    els.play.addEventListener('click', () => {
      if (audio.paused) audio.play().catch(() => {}); else audio.pause();
    });
    els.prev.addEventListener('click', prevStation);
    els.next.addEventListener('click', nextStation);
    els.diceBtn.addEventListener('click', randomCountry);
    const ICON_VOL = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z';
    const ICON_MUTE = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z';
    let lastVolume = parseFloat(els.vol.value) || 0.8;
    let wasMuted = false;

    function updateVolFill() { els.vol.style.setProperty('--vol', (parseFloat(els.vol.value) * 100) + '%'); }
    function updateVolIcon() {
      const muted = parseFloat(els.vol.value) === 0;
      els.volIconPath.setAttribute('d', muted ? ICON_MUTE : ICON_VOL);
      els.mute.title = muted ? 'Rétablir le son' : 'Couper le son';
      if (muted !== wasMuted) {           // anime seulement au changement d'état
        els.mute.classList.remove('anim'); void els.mute.offsetWidth; els.mute.classList.add('anim');
      }
      wasMuted = muted;
    }
    function toggleMute() {
      if (parseFloat(els.vol.value) > 0) {
        lastVolume = parseFloat(els.vol.value) || 0.8;
        els.vol.value = 0;
      } else {
        els.vol.value = lastVolume || 0.8;
      }
      audio.volume = parseFloat(els.vol.value);
      updateVolFill(); updateVolIcon();
    }

    els.vol.addEventListener('input', () => { audio.volume = parseFloat(els.vol.value); updateVolFill(); updateVolIcon(); });
    els.mute.addEventListener('click', toggleMute);
    updateVolFill(); updateVolIcon();
    els.close.addEventListener('click', () => {
      audio.pause(); cleanupHls(); audio.removeAttribute('src'); audio.load();
      els.player.classList.remove('show');
      map.setFilter('countries-hl', ['==', ['get', 'ISO_A2_EH'], '___none___']);
      hidePulse();
      radioActive = false; currentCountry = ''; currentStation = null; lastTime = performance.now();
    });

    /* ================= FAVORIS ================= */
    function loadFavs() {
      try { favorites = JSON.parse(localStorage.getItem('wavemap-favs') || '[]'); }
      catch (e) { favorites = []; }
    }
    function saveFavs() { localStorage.setItem('wavemap-favs', JSON.stringify(favorites)); }
    function isFav(uuid) { return !!uuid && favorites.some(f => f.uuid === uuid); }
    function updateFavBadge() { els.favCount.textContent = favorites.length || ''; }

    function updateFavButton() {
      const on = currentStation && isFav(currentStation.stationuuid);
      els.star.classList.toggle('on', !!on);
      els.star.title = on ? 'Retirer des favoris' : 'Ajouter aux favoris';
    }

    function toggleFav() {
      if (!currentStation) return;
      const uuid = currentStation.stationuuid;
      const i = favorites.findIndex(f => f.uuid === uuid);
      if (i >= 0) favorites.splice(i, 1);
      else favorites.push({
        uuid,
        name: currentStation.name || 'Station',
        favicon: currentStation.favicon || '',
        cc: currentCountry,
        country: currentCountryName,
        lng: currentLngLat ? currentLngLat.lng : null,
        lat: currentLngLat ? currentLngLat.lat : null
      });
      saveFavs(); updateFavButton(); updateFavBadge();
      if (els.favPanel.classList.contains('show')) renderFavList();
    }

    function playFavorite(f) {
      els.favPanel.classList.remove('show');
      const ll = (f.lng != null && f.lat != null) ? { lng: f.lng, lat: f.lat } : null;
      selectCountry(f.cc, f.country || f.cc, ll, f.uuid);
    }

    function renderFavList() {
      els.favList.innerHTML = '';
      if (!favorites.length) {
        const e = document.createElement('div');
        e.className = 'fav-empty';
        e.textContent = t('noFav');
        els.favList.appendChild(e);
        return;
      }
      favorites.forEach(f => {
        const row = document.createElement('div'); row.className = 'fav-row';
        const play = document.createElement('button'); play.className = 'fav-play';
        const ico = document.createElement('span'); ico.className = 'fav-ico';
        if (f.favicon) { const im = new Image(); im.src = f.favicon; im.onerror = () => { ico.textContent = '📻'; }; ico.appendChild(im); }
        else ico.textContent = '📻';
        const nm = document.createElement('span'); nm.className = 'fav-name';
        nm.textContent = `${flagEmoji(f.cc)} ${f.name}`;
        play.appendChild(ico); play.appendChild(nm);
        play.addEventListener('click', () => playFavorite(f));
        const del = document.createElement('button'); del.className = 'fav-del'; del.textContent = '✕'; del.title = t('remove');
        del.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const k = favorites.findIndex(x => x.uuid === f.uuid);
          if (k >= 0) { favorites.splice(k, 1); saveFavs(); renderFavList(); updateFavBadge(); updateFavButton(); }
        });
        row.appendChild(play); row.appendChild(del);
        els.favList.appendChild(row);
      });
    }

    els.star.addEventListener('click', toggleFav);
    els.favToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const show = !els.favPanel.classList.contains('show');
      els.favPanel.classList.toggle('show', show);
      if (show) renderFavList();
    });
    document.addEventListener('click', (e) => {
      if (els.favPanel.classList.contains('show') &&
          !els.favPanel.contains(e.target) && !els.favToggle.contains(e.target)) {
        els.favPanel.classList.remove('show');
      }
    });

    /* ================= RECHERCHE (genre ou nom de radio) ================= */
    async function rbGet(path) {
      for (const base of RB_MIRRORS) {
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 6000);
          const r = await fetch(base + path, { signal: ctrl.signal });
          clearTimeout(t);
          if (r.ok) return await r.json();
        } catch (e) { /* miroir suivant */ }
      }
      return null;
    }

    async function searchStations(q) {
      const enc = encodeURIComponent(q.trim());
      // recherche par nom ET par genre (tag) en parallèle, puis fusion
      const [byName, byTag] = await Promise.all([
        rbGet(`/json/stations/search?name=${enc}&hidebroken=true&order=clickcount&reverse=true&limit=25`),
        rbGet(`/json/stations/search?tag=${enc}&hidebroken=true&order=clickcount&reverse=true&limit=25`)
      ]);
      const httpsOnly = location.protocol === 'https:';
      const seen = new Set(), out = [];
      for (const s of [...(byName || []), ...(byTag || [])]) {
        if (!s.url_resolved || s.lastcheckok !== 1) continue;
        if (httpsOnly && !s.url_resolved.startsWith('https')) continue;
        if (seen.has(s.stationuuid)) continue;
        seen.add(s.stationuuid); out.push(s);
      }
      out.sort((a, b) => (b.votes + b.clickcount) - (a.votes + a.clickcount));
      return out.slice(0, 12);
    }

    function closeSearch() { els.searchPanel.classList.remove('show'); }

    // Joue une station précise (résultat de recherche) avec son contexte pays
    function playStationDirect(station) {
      closeSearch();
      els.searchInput.blur();
      const cc = (station.countrycode || '').toUpperCase();
      const name = station.country || cc || 'Radio';
      currentCountry = cc;
      currentCountryName = name;
      let ll = null;
      if (station.geo_lat && station.geo_long) ll = { lng: station.geo_long, lat: station.geo_lat };
      else { const c = countriesData.find(p => p.ISO_A2_EH === cc); if (c) ll = { lng: c.LABEL_X, lat: c.LABEL_Y }; }
      currentLngLat = ll;
      radioActive = true;
      errStreak = 0; stations = [station]; idx = 0;
      els.name.innerHTML = `${flagEmoji(cc)} ${name}`;
      els.player.classList.add('show');
      if (cc) map.setFilter('countries-hl', ['==', ['get', 'ISO_A2_EH'], cc]);
      showPulse(ll);
      if (ll) map.easeTo({ center: ll, offset: [0, -window.innerHeight * 0.55], duration: 1100 });
      updateCount();
      loadAndPlay(station);
    }

    function renderSearchResults(list) {
      els.searchList.innerHTML = '';
      if (!list.length) {
        const e = document.createElement('div'); e.className = 'search-empty';
        e.textContent = t('noResult');
        els.searchList.appendChild(e); return;
      }
      list.forEach(s => {
        const row = document.createElement('button'); row.className = 'search-row';
        const ico = document.createElement('span'); ico.className = 'search-ico';
        if (s.favicon) { const im = new Image(); im.src = s.favicon; im.onerror = () => { ico.textContent = '📻'; }; ico.appendChild(im); }
        else ico.textContent = '📻';
        const meta = document.createElement('span'); meta.className = 'search-meta';
        const nm = document.createElement('span'); nm.className = 'search-name'; nm.textContent = s.name || 'Station';
        const sub = document.createElement('span'); sub.className = 'search-sub';
        const tags = (s.tags || '').split(',').filter(Boolean).slice(0, 2).join(', ');
        sub.textContent = `${flagEmoji(s.countrycode)} ${s.country || ''}${tags ? ' · ' + tags : ''}`;
        meta.appendChild(nm); meta.appendChild(sub);
        row.appendChild(ico); row.appendChild(meta);
        row.addEventListener('click', () => playStationDirect(s));
        els.searchList.appendChild(row);
      });
    }

    let searchTimer = null, searchSeq = 0, lastResults = [];
    els.searchInput.addEventListener('input', () => {
      const q = els.searchInput.value.trim();
      clearTimeout(searchTimer);
      if (!q) { closeSearch(); lastResults = []; return; }
      els.searchPanel.classList.add('show');
      els.searchList.innerHTML = '<div class="search-loading"><span class="spinner"></span> ' + t('searching') + '</div>';
      searchTimer = setTimeout(async () => {
        const seq = ++searchSeq;
        const res = await searchStations(q);
        if (seq !== searchSeq) return;     // résultat obsolète
        lastResults = res;
        renderSearchResults(res);
      }, 320);
    });
    els.searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && lastResults.length) playStationDirect(lastResults[0]);
      else if (e.key === 'Escape') { closeSearch(); els.searchInput.blur(); }
    });
    els.searchInput.addEventListener('focus', () => {
      if (els.searchInput.value.trim() && els.searchList.children.length) els.searchPanel.classList.add('show');
    });
    document.addEventListener('click', (e) => {
      if (els.searchPanel.classList.contains('show') &&
          !els.searchPanel.contains(e.target) && e.target !== els.searchInput) {
        closeSearch();
      }
    });

    loadFavs();
    updateFavBadge();
    updateFavButton();
  </script>
</body>
</html>
