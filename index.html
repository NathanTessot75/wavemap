<!DOCTYPE html>
<html lang="fr" id="root">
<head>
  <meta charset="utf-8" />
  <title>Wavemap</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5/dist/iro.min.js"></script>
  <link rel="stylesheet" href="fonts/genty.css" />
  <style>
    :root {
      --accent: #8b5cf6;
      /* Mode clair (par défaut) */
      --bg: #ffffff;
      --card-bg: rgba(255,255,255,0.94);
      --card-border: rgba(0,0,0,0.07);
      --text: #1b1b26;
      --text-sub: #6a6a7a;
      --btn-bg: rgba(0,0,0,0.05);
      --btn-hover: rgba(0,0,0,0.11);
      --status: #2a8fc0;
      --shadow: 0 12px 40px rgba(0,0,0,.16);
    }
    body.dark {
      /* Mode sombre */
      --bg: #1f1f28;
      --card-bg: rgba(42,42,54,0.92);
      --card-border: rgba(255,255,255,0.09);
      --text: #ffffff;
      --text-sub: #b8b8c8;
      --btn-bg: rgba(255,255,255,0.10);
      --btn-hover: rgba(255,255,255,0.20);
      --status: #a0e0ff;
      --shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100dvh; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background .4s; }

    /* Bouton mode clair / sombre */
    .theme-toggle {
      position: absolute; top: 18px; left: 18px; z-index: 20;
      width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text);
      font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); backdrop-filter: blur(8px); transition: background .25s, transform .1s;
    }
    .theme-toggle:hover { transform: scale(1.06); }
    .theme-toggle:active { transform: scale(.94); }

    /* Bouton + panneau Favoris (haut droite) */
    /* Barre d'outils en haut à droite : dé + recherche + favoris */
    .topbar-right {
      position: absolute; top: 18px; right: 18px; z-index: 20;
      display: flex; align-items: center; gap: 8px;
    }
    .fav-toggle {
      position: relative; flex: 0 0 auto;
      width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); backdrop-filter: blur(8px); transition: background .25s, transform .1s;
    }
    .fav-toggle:hover { transform: scale(1.06); }
    .fav-toggle:active { transform: scale(.94); }
    .fav-toggle svg { width: 23px; height: 23px; fill: currentColor; }
    .fav-badge {
      position: absolute; top: -3px; right: -3px; min-width: 16px; height: 16px;
      border-radius: 999px; background: var(--accent); color: #fff; font-size: 10px;
      font-weight: 700; display: flex; align-items: center; justify-content: center;
      padding: 0 4px; box-shadow: 0 0 0 2px var(--bg);
    }
    .fav-badge:empty { display: none; }

    /* Bouton pays au hasard (dé) */
    .dice-toggle {
      flex: 0 0 auto;
      width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); backdrop-filter: blur(8px); transition: background .25s, transform .1s;
    }
    .dice-toggle:hover { transform: scale(1.06); }
    .dice-toggle:active { transform: scale(.94); }
    .dice-toggle svg { width: 22px; height: 22px; }
    .dice-toggle.rolling svg { animation: diceRoll .5s ease; }
    @keyframes diceRoll { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    /* Champ de recherche (genre ou nom de radio) + résultats */
    .search-box { position: relative; flex: 0 0 auto; }
    .search-input {
      height: 42px; width: 190px; max-width: 42vw;
      border-radius: 999px; border: 1px solid var(--card-border);
      background: var(--card-bg); color: var(--text);
      padding: 0 16px; font-size: 14px; outline: none;
      box-shadow: var(--shadow); backdrop-filter: blur(8px);
      transition: width .2s, box-shadow .2s;
    }
    .search-input:focus { width: 230px; }
    .search-input::placeholder { color: var(--text-sub); }
    .search-panel {
      position: absolute; top: 50px; left: 0; width: 300px; max-width: 86vw;
      max-height: 62vh; overflow-y: auto;
      background: var(--card-bg); color: var(--text);
      border: 1px solid var(--card-border); border-radius: 16px;
      box-shadow: var(--shadow); backdrop-filter: blur(14px); padding: 8px;
      opacity: 0; transform: translateY(-8px) scale(.98); pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .search-panel.show { opacity: 1; transform: none; pointer-events: auto; }
    .search-row {
      display: flex; align-items: center; gap: 10px; width: 100%;
      border: none; background: none; color: inherit; cursor: pointer;
      padding: 7px 8px; border-radius: 10px; text-align: left;
    }
    .search-row:hover { background: var(--btn-bg); }
    .search-ico {
      width: 30px; height: 30px; border-radius: 8px; flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      background: linear-gradient(135deg, #8b5cf6, #5aa9d6); overflow: hidden;
    }
    .search-ico img { width: 100%; height: 100%; object-fit: cover; }
    .search-meta { min-width: 0; display: flex; flex-direction: column; }
    .search-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-sub { font-size: 11.5px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-empty, .search-loading { padding: 14px 8px; color: var(--text-sub); font-size: 13.5px; text-align: center; }

    .fav-panel {
      position: absolute; top: 68px; right: 18px; z-index: 19;
      width: min(300px, calc(100vw - 36px)); max-height: 60vh; overflow-y: auto;
      background: var(--card-bg); color: var(--text);
      border: 1px solid var(--card-border); border-radius: 16px;
      box-shadow: var(--shadow); backdrop-filter: blur(14px); padding: 10px;
      opacity: 0; transform: translateY(-8px) scale(.98); pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .fav-panel.show { opacity: 1; transform: none; pointer-events: auto; }
    .fav-head { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); padding: 4px 8px 8px; }
    .fav-empty { padding: 14px 8px; color: var(--text-sub); font-size: 14px; text-align: center; }
    .fav-row { display: flex; align-items: center; gap: 4px; }
    .fav-play {
      flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0;
      border: none; background: none; color: inherit; cursor: pointer;
      padding: 7px 8px; border-radius: 10px; text-align: left; font-size: 14px;
    }
    .fav-play:hover { background: var(--btn-bg); }
    .fav-ico { width: 26px; height: 26px; border-radius: 7px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 14px; background: linear-gradient(135deg, #8b5cf6, #5aa9d6); overflow: hidden; }
    .fav-ico img { width: 100%; height: 100%; object-fit: cover; }
    .fav-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-del { border: none; background: none; color: var(--text-sub); cursor: pointer; font-size: 13px; padding: 6px; border-radius: 8px; flex: 0 0 auto; }
    .fav-del:hover { color: var(--text); background: var(--btn-bg); }

    /* Étoile favori dans le lecteur */
    #plStar svg { width: 19px; height: 19px; }
    #plStar.on svg path { fill: #ffc83d; stroke: #ffc83d; }

    /* Logo Wavemap (police Genty Demo, installée localement) */
    .logo {
      position: absolute; top: 18px; left: 66px; z-index: 20;
      height: 42px; display: flex; align-items: center;
      padding: 0 16px;                /* espace pour les swashes du script (W, p) */
      font-family: 'Genty Demo', cursive;
      font-size: 37px; line-height: 1; color: var(--text);
      overflow: visible; white-space: nowrap;
      transform: translateY(7px); /* aligne le centre visuel du script sur le bouton */
      pointer-events: none; user-select: none;
    }
    /* Phrase d'accroche centrée en haut */
    .tagline {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      height: 56px; display: flex; align-items: center; justify-content: center;
      z-index: 15; pointer-events: none; user-select: none;
      font-size: 15px; font-weight: 600; color: var(--text);
      white-space: nowrap; letter-spacing: .2px;
    }
    /* masquée sur écrans étroits pour ne pas chevaucher logo / recherche */
    @media (max-width: 1180px) { .tagline { display: none; } }
    /* Grille de points en fond (derrière le globe) */
    #dots { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    /* Globe plein écran (le positionnement bas se fait via le padding de la carte) */
    #map { position: fixed; inset: 0; z-index: 1; }
    .maplibregl-ctrl-attrib, .maplibregl-ctrl-logo { display: none !important; }
    #map canvas { cursor: grab; }
    #map canvas:active { cursor: grabbing; }

    /* Dirigeable publicitaire + banderole */
    #blimp, .blimp-unit {
      position: fixed; left: 0; top: 0; z-index: 6;
      display: flex; align-items: center; gap: 4px;
      pointer-events: none; will-change: transform;
      /* rapproche la banderole de l'arrière du dirigeable (compense la marge transparente du PNG) */
      --banner-pull: 30px;
    }
    .blimp-svg { width: 165px; height: auto; flex: 0 0 auto; }
    .blimp-img { width: 165px; height: auto; flex: 0 0 auto; display: none; }
    /* calque dédié au tangage du dirigeable (indépendant du retournement gauche/droite) */
    .blimp-craft { flex: 0 0 auto; display: flex; align-items: center; transform-origin: center; animation: blimpPitch 7s ease-in-out infinite; }
    @keyframes blimpPitch { 0%, 100% { transform: rotate(-1.2deg); } 50% { transform: rotate(1.2deg); } }
    /* quand une vraie image de dirigeable est chargée, on cache le SVG de secours */
    #blimp.has-img .blimp-svg, .blimp-unit.has-img .blimp-svg { display: none; }
    #blimp.has-img .blimp-img, .blimp-unit.has-img .blimp-img { display: block; }
    /* Défaut : vol vers la GAUCHE. Tes PNG regardent à droite -> on les retourne (nez à gauche). */
    .blimp-img { transform: scaleX(-1); }
    /* Vol vers la DROITE : on inverse l'ordre (banderole derrière, à gauche) et les orientations. */
    #blimp.dir-right, .blimp-unit.dir-right { flex-direction: row-reverse; }
    #blimp.dir-right .blimp-img, .blimp-unit.dir-right .blimp-img { transform: none; }
    #blimp.dir-right .blimp-svg, .blimp-unit.dir-right .blimp-svg { transform: scaleX(-1); }
    #blimp.dir-right .blimp-banner-wrap, .blimp-unit.dir-right .blimp-banner-wrap { transform: scaleX(-1); margin-left: 0; margin-right: calc(-1 * var(--banner-pull)); }
    #blimp.dir-right .blimp-banner image, .blimp-unit.dir-right .blimp-banner image,
    #blimp.dir-right .blimp-banner text, .blimp-unit.dir-right .blimp-banner text { transform-box: fill-box; transform-origin: center; transform: scaleX(-1); }
    .blimp-banner-wrap { flex: 0 0 auto; display: flex; align-items: center; margin-left: calc(-1 * var(--banner-pull)); }
    /* wrapper qui ondule : porte l'animation pour que le drapeau SVG ET l'overlay vidéo bougent ensemble */
    .blimp-banner-wave {
      position: relative; display: inline-flex;
      transform-origin: left center;
      animation: bannerWave 3.4s ease-in-out infinite;
    }
    .blimp-banner { width: 185px; height: auto; display: block; }
    /* Overlay vidéo : posé sur la zone média du drapeau, clippé à sa forme, ondule avec le wrapper */
    .blimp-video-overlay {
      position: absolute; left: 27.44%; top: 10.78%; width: 71.34%; height: 86.79%;
      overflow: hidden; pointer-events: none; display: none;
      clip-path: url(#adFlagClip); -webkit-clip-path: url(#adFlagClip);
    }
    .blimp-video-overlay video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #blimp.dir-right .blimp-video-overlay video, .blimp-unit.dir-right .blimp-video-overlay video { transform: scaleX(-1); }
    /* flottement au vent : ondulation douce et constante, qui part du harnais */
    @keyframes bannerWave {
      0%, 100% { transform: skewY(-2.4deg) rotate(-0.6deg); }
      50%      { transform: skewY(2.4deg) rotate(0.6deg); }
    }

    .legal-link {
      position: fixed; bottom: 10px; right: 14px; z-index: 20;
      font-size: 11px; color: var(--text-sub); opacity: .5; text-decoration: none;
      transition: opacity .2s;
    }
    .legal-link:hover { opacity: 1; }

    /* ===== Pub dirigeable : bouton flottant rond + modale des offres ===== */
    .ad-fab {
      position: fixed; bottom: 22px; left: 22px; z-index: 25; cursor: pointer;
      width: 42px; height: 42px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: 1px solid var(--card-border);
      background: var(--card-bg); color: var(--text);
      box-shadow: var(--shadow); backdrop-filter: blur(8px);
      transition: transform .15s, background .2s;
    }
    .ad-fab svg { width: 26px; height: 26px; fill: currentColor; }
    .ad-fab:hover { transform: translateY(-2px) scale(1.06); }
    .ad-fab:active { transform: scale(.94); }

    /* Bottom sheet : glisse depuis le bas, occupe la moitié inférieure */
    .ad-modal {
      position: fixed; inset: 0; z-index: 60; display: flex; align-items: flex-end; justify-content: center;
      background: rgba(8,8,14,0); pointer-events: none; transition: background .3s ease;
    }
    .ad-modal.open { background: rgba(8,8,14,.5); pointer-events: auto; }
    .ad-sheet {
      width: 100%; height: 64vh; overflow: hidden; position: relative;
      background: var(--card-bg); color: var(--text);
      border-top: 1px solid var(--card-border);
      border-top-left-radius: 26px; border-top-right-radius: 26px;
      box-shadow: 0 -16px 50px rgba(0,0,0,.4);
      padding: 18px 40px 38px; backdrop-filter: blur(16px);
      /* +80px : cache l'ombre portée (0 -16px 50px) qui sinon déborde en bas d'écran quand fermé */
      transform: translateY(calc(100% + 80px));
      transition: transform .4s cubic-bezier(.2,.8,.25,1);
    }
    .ad-modal.open .ad-sheet { transform: translateY(0); }
    .ad-grabber { width: 40px; height: 4px; border-radius: 999px; background: var(--card-border); margin: 0 auto 14px; }
    .ad-sheet-inner { max-width: 1400px; margin: 0 auto; }
    .ad-close { position: absolute; top: 14px; right: 16px; border: none; background: none; cursor: pointer; color: var(--text-sub); font-size: 20px; line-height: 1; padding: 4px; transition: color .2s, transform .25s cubic-bezier(.34,1.56,.64,1); }
    .ad-close:hover { color: var(--text); transform: rotate(90deg) scale(1.1); }
    .ad-close:active { transform: rotate(90deg) scale(.9); }
    .ad-title { margin: 6px 0 32px; font-family: 'Genty Demo', cursive; font-size: 42px; line-height: 1.05; text-align: center; }
    .ad-offers { display: flex; gap: 24px; margin-bottom: 30px; }
    .ad-offer {
      flex: 1; text-align: left; cursor: pointer; padding: 26px; border-radius: 20px;
      border: 2px solid var(--card-border); background: var(--btn-bg); color: inherit;
      transition: border-color .15s, transform .25s cubic-bezier(.34,1.56,.64,1), background .15s, box-shadow .2s;
    }
    .ad-offer:hover { transform: translateY(-4px) scale(1.015); box-shadow: 0 16px 32px rgba(0,0,0,.16); }
    .ad-offer:active { transform: translateY(-1px) scale(.99); }
    .ad-offer.selected { border-color: var(--accent); background: rgba(139,92,246,.14); }
    .ad-offer-name { font-size: 20px; font-weight: 750; }
    .ad-offer-price { font-size: 34px; font-weight: 800; margin: 12px 0 8px; }
    .ad-offer-desc { font-size: 15px; color: var(--text-sub); }
    .ad-upload {
      display: block; cursor: pointer; border: 2px dashed var(--card-border); border-radius: 20px;
      padding: 28px; text-align: center; overflow: hidden; transition: border-color .15s;
    }
    .ad-upload:hover { border-color: var(--accent); }
    .ad-upload-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-sub); font-size: 13.5px; }
    .ad-upload-icon { font-size: 24px; }
    .ad-preview { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; display: block; }
    .ad-note { font-size: 12px; color: var(--text-sub); margin: 22px 0 22px; line-height: 1.5; text-align: center; }
    .ad-status { font-size: 13px; text-align: center; margin: 12px 0 0; line-height: 1.45; }
    .ad-status.is-error { color: #e5484d; }
    .ad-status.is-info { color: var(--text-sub); }
    .ad-status.is-ok { color: #30a46c; }
    .ad-launch {
      display: block; width: 100%;
      max-width: 1046px; /* aligné sur ad-layout : 340 (cards) + 36 (gap) + 670 (canvas) */
      margin: 0 auto;
      border: none; border-radius: 16px; padding: 17px; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
      box-shadow: none;
      transition: background .2s, transform .1s, opacity .2s;
    }
    .ad-launch:hover:not(:disabled) { background: #9d70f7; }
    .ad-launch:active:not(:disabled) { transform: scale(.98); }
    .ad-launch:disabled { opacity: .45; cursor: not-allowed; }
    @keyframes adFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    @keyframes adBtnPulse {
      0%, 100% { box-shadow: 0 4px 18px rgba(139,92,246,0.18); }
      50%       { box-shadow: 0 4px 36px rgba(139,92,246,0.55); }
    }
    .ad-launch.ad-ready { animation: adBtnPulse 3.5s ease-in-out infinite; }
    .ad-launch:not(.ad-ready) { animation: none !important; box-shadow: none !important; }
    .ad-launch-label { display: inline-block; }
    .ad-launch.ad-ready .ad-launch-letter {
      display: inline-block;
      animation: adFloat 2.2s ease-in-out infinite;
    }
    .ad-pay { text-align: center; font-size: 11.5px; color: var(--text-sub); margin: 10px 0 0; }

    /* ===== Nouveau layout pub : offres empilées à gauche, canvas à droite ===== */
    .ad-sheet { height: 78vh; }
    .ad-layout {
      display: grid; grid-template-columns: minmax(260px, 340px) minmax(570px, 670px); gap: 36px;
      align-items: start; margin-bottom: 22px;
      justify-content: center;
    }
    .ad-layout .ad-offers { display: flex; flex-direction: column; gap: 22px; margin-bottom: 0; }
    .ad-layout .ad-offer { padding: 30px 30px; border-radius: 22px; }
    .ad-layout .ad-offer-name { font-size: 24px; font-weight: 750; }
    .ad-layout .ad-offer-price { font-size: 40px; margin: 13px 0 9px; }
    .ad-layout .ad-offer-desc { font-size: 16px; }
    .ad-canvas-col {
      display: flex; flex-direction: column; gap: 14px; min-width: 0;
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 22px;
    }
    .ad-canvas-col .ad-tools { flex-wrap: nowrap; }
    body.dark .ad-canvas-col { background: rgba(255,255,255,0.04); }

    /* Éditeur : la banderole entière en contour SVG ; le canvas blanc occupe la zone "drapeau" */
    .ad-banner-editor {
      position: relative; width: 100%; aspect-ratio: 820 / 371;
    }
    .ad-banner-outline {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; color: var(--text-sub); opacity: 0.75;
      z-index: 2; /* au-dessus du canvas pour qu'on voie tout le contour autour */
    }
    .ad-banner-outline path {
      stroke-dasharray: 70 45; /* en path-coords (échelle x10) → ~7px/4.5px à l'écran */
    }
    .ad-canvas-stack {
      position: absolute;
      left: 27.44%;  /* 225/820 — commence pile au début du drapeau (après le pole) */
      top: 10.78%;   /*  40/371 */
      width: 71.34%; /* 585/820 */
      height: 86.79%;/* 322/371 */
      background: #ffffff;
      /* Suit la silhouette exacte du drapeau ; clippe aussi les pointer events */
      clip-path: url(#adFlagClip);
      -webkit-clip-path: url(#adFlagClip);
    }
    .ad-canvas-stack canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .ad-video-preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; background: #000; }
    .ad-canvas-stack.mode-video canvas,
    .ad-canvas-stack.mode-video .ad-canvas-events { display: none; }
    .ad-canvas-stack.mode-video .ad-video-preview { display: block; }
    .ad-canvas-events {
      position: absolute; inset: 0; cursor: crosshair; touch-action: none;
    }
    .ad-canvas-stack.tool-eraser .ad-canvas-events { cursor: cell; }
    .ad-canvas-stack.tool-image .ad-canvas-events { cursor: grab; }
    .ad-canvas-stack.tool-image .ad-canvas-events:active { cursor: grabbing; }

    /* Barre d'outils du canvas */
    .ad-tools {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .ad-tool {
      border: 1px solid var(--card-border); background: var(--card-bg);
      color: var(--text); padding: 8px 10px; border-radius: 10px; cursor: pointer;
      font-size: 18px; line-height: 1; min-width: 38px;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .18s, border-color .15s, color .15s, transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .ad-tool:hover:not(:disabled) { background: var(--btn-hover); transform: scale(1.12); }
    .ad-tool:active:not(:disabled) { transform: scale(.9); }
    .ad-tool.active { border-color: var(--accent); color: var(--accent); background: rgba(139,92,246,.12); }
    .ad-tool:disabled { opacity: .45; cursor: not-allowed; }
    .ad-tool-file { cursor: pointer; }
    /* Dropdown média */
    .ad-media-wrap { position: relative; flex-shrink: 0; }
    .ad-media-dropdown {
      display: none; position: absolute;
      bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      z-index: 100; white-space: nowrap;
      flex-direction: column; gap: 2px; min-width: 185px;
    }
    .ad-media-dropdown.open { display: flex; }
    .ad-media-option {
      display: flex; align-items: center; gap: 9px;
      border: none; background: none; color: var(--text);
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      font-size: 13.5px; text-align: left; width: 100%;
      transition: background .12s;
    }
    .ad-media-option:hover:not(:disabled) { background: var(--btn-bg); }
    .ad-media-option:disabled { opacity: .4; cursor: not-allowed; }
    .ad-media-option svg { width: 15px; height: 15px; flex-shrink: 0; }
    .ad-tool svg { width: 18px; height: 18px; display: block; flex-shrink: 0; }
    /* Roue de couleur custom */
    .ad-color-wrap { position: relative; flex-shrink: 0; }
    .ad-color-btn {
      min-width: 38px; padding: 8px 10px; border-radius: 10px;
      border: 1px solid var(--card-border); cursor: pointer;
      background: #8b5cf6;
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), border-color .15s;
      flex-shrink: 0;
    }
    .ad-color-btn:hover:not(:disabled) { border-color: var(--accent); transform: scale(1.12); }
    .ad-color-btn:active:not(:disabled) { transform: scale(.9); }
    .ad-color-btn:disabled { opacity: .45; cursor: not-allowed; }
    .ad-color-icon { width: 18px; height: 18px; color: #fff; flex-shrink: 0; }
    .ad-color-popover {
      display: none; position: absolute;
      bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.22);
      z-index: 200;
    }
    .ad-color-popover.open { display: block; }
    /* Fix iro.js slider visual artifacts */
    #adIroPicker .IroSlider { background: transparent !important; overflow: hidden !important; }
    #adIroPicker .IroSliderGradient { border: none !important; }
    .ad-size-wrap { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
    .ad-size-wrap.is-disabled { opacity: .45; pointer-events: none; }
    .ad-size:disabled { cursor: not-allowed; }
    .ad-size {
      width: 110px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; outline: none; border: none; background: none;
    }
    .ad-size::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ad-brush-color, #8b5cf6); cursor: pointer;
      margin-top: -5px;
    }
    .ad-size::-webkit-slider-runnable-track {
      height: 4px; border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--ad-brush-color, #8b5cf6) 0%,
        var(--ad-brush-color, #8b5cf6) var(--ad-size-fill, 12.5%),
        rgba(255,255,255,0.15) var(--ad-size-fill, 12.5%)
      );
    }
    .ad-size::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; border: none;
      background: var(--ad-brush-color, #8b5cf6); cursor: pointer;
    }
    .ad-size::-moz-range-track { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); }
    .ad-size::-moz-range-progress { height: 4px; border-radius: 2px; background: var(--ad-brush-color, #8b5cf6); }
    .ad-size-num { font-size: 12px; color: var(--text-sub); min-width: 22px; text-align: right; }
    .ad-tool-clear { margin-left: auto; }
    .ad-hint {
      font-size: 11.5px; color: var(--text-sub); margin: 0;
      padding: 0 4px;
    }
    @media (max-width: 560px) {
      .logo { display: none; }
      .ad-sheet { height: 92vh; padding: 14px 14px 22px; }
      .ad-sheet-inner { overflow-y: auto; max-height: calc(92vh - 90px); padding-bottom: 24px; }
      .ad-title { font-size: 26px; margin: 4px 0 18px; }
      .ad-layout { grid-template-columns: 1fr; gap: 14px; }
      .ad-layout .ad-offers { flex-direction: row; gap: 10px; }
      .ad-layout .ad-offer { padding: 14px 16px; border-radius: 16px; }
      .ad-layout .ad-offer-name { font-size: 15px; }
      .ad-layout .ad-offer-price { font-size: 24px; margin: 6px 0 4px; }
      .ad-layout .ad-offer-desc { font-size: 12px; }
      .ad-canvas-col { padding: 12px; border-radius: 16px; }
      .ad-canvas-col .ad-tools { flex-wrap: wrap; }
      .ad-tool { padding: 7px 8px; min-width: 34px; border-radius: 8px; font-size: 16px; }
      .ad-tool svg { width: 16px; height: 16px; }
      .ad-size-wrap { gap: 6px; }
      .ad-size { width: 80px; }
      .ad-launch { padding: 14px; font-size: 15px; border-radius: 14px; }
      .ad-note { font-size: 11px; margin: 14px 0 14px; }
      .ad-hint { font-size: 10.5px; }
    }

    .blimp-prop { transform-box: fill-box; transform-origin: center; animation: propSpin .5s linear infinite; }
    @keyframes propSpin { to { transform: rotate(360deg); } }

    /* Lecteur radio */
    #player {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%) translateY(-140%);
      width: min(440px, calc(100vw - 32px));
      background: var(--card-bg); color: var(--text); border-radius: 20px;
      border: 1px solid var(--card-border);
      padding: 16px 18px; z-index: 20; backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      transition: transform .45s cubic-bezier(.2,.9,.3,1.2), opacity .3s, background .3s;
      opacity: 0;
    }
    #player.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .pl-top { display: flex; align-items: center; gap: 12px; }
    .pl-fav {
      width: 46px; height: 46px; border-radius: 12px; flex: 0 0 auto;
      background: linear-gradient(135deg, #8b5cf6, #5aa9d6); object-fit: cover;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .pl-meta { flex: 1; min-width: 0; }
    .pl-country { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; }
    .pl-station { font-size: 17px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .pl-status { font-size: 12.5px; color: var(--status); margin-top: 3px; min-height: 16px; }
    .pl-status.err { color: #ff9b9b; }
    .live-txt { display: inline-block; animation: liveBlink 2.2s ease-in-out infinite; }
    .toast-confetti { height: 1.5em; vertical-align: -.35em; margin-right: .35em; }
    body.dark .toast-confetti { filter: invert(1); }
    @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .pl-close {
      position: absolute; top: 12px; right: 14px; cursor: pointer; color: var(--text-sub);
      font-size: 20px; line-height: 1; border: none; background: none; padding: 4px;
      transition: color .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .pl-close:hover { color: var(--text); transform: rotate(90deg) scale(1.1); }
    .pl-close:active { transform: rotate(90deg) scale(.9); }

    .pl-ctrls { display: flex; align-items: center; gap: 14px; margin-top: 14px; }
    .pl-btn {
      border: none; background: var(--btn-bg); color: var(--text); cursor: pointer;
      width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center;
      transition: background .18s, transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
    }
    .pl-btn:hover { background: var(--btn-hover); transform: scale(1.12); }
    .pl-btn:active { transform: scale(.88); }
    .pl-btn.primary { width: 52px; height: 52px; background: var(--accent); }
    .pl-btn.primary:hover { background: #9d70f7; transform: scale(1.09); box-shadow: 0 0 0 6px rgba(139,92,246,.18); }
    .pl-btn.primary:active { transform: scale(.95); }
    .pl-btn svg { width: 20px; height: 20px; fill: var(--text); transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .pl-btn.primary svg { width: 24px; height: 24px; fill: #fff; }
    /* les flèches glissent au survol */
    #plPrev:hover svg { transform: translateX(-2.5px); }
    #plNext:hover svg { transform: translateX(2.5px); }
    /* étoile favori : tourne au survol, "pop" quand on l'active */
    #plStar:hover svg { transform: scale(1.18) rotate(-10deg); }
    #plStar.on svg { animation: starPop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes starPop { 0% { transform: scale(.5); } 55% { transform: scale(1.35); } 100% { transform: scale(1); } }

    .pl-vol { display: flex; align-items: center; gap: 8px; flex: 1; }
    .pl-volbtn {
      border: none; background: none; padding: 0; margin: 0; cursor: pointer;
      display: flex; align-items: center; flex: 0 0 auto; color: var(--text-sub);
      transition: color .2s;
    }
    .pl-volbtn:hover { color: var(--text); }
    .pl-vol svg { width: 18px; height: 18px; fill: currentColor; flex: 0 0 auto; transition: transform .15s; }
    .pl-volbtn:active svg { transform: scale(.82); }
    .pl-volbtn.anim svg { animation: volPop .32s cubic-bezier(.34,1.56,.64,1); }
    @keyframes volPop { 0% { transform: scale(.55); } 55% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .pl-vol input {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 5px; border-radius: 999px; cursor: pointer; outline: none;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--vol, 80%), var(--btn-bg) var(--vol, 80%));
    }
    .pl-vol input::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
      border: 2px solid var(--card-bg); box-shadow: 0 1px 3px rgba(0,0,0,.25);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
    }
    .pl-vol input:hover::-webkit-slider-thumb { transform: scale(1.25); }
    .pl-vol input:focus::-webkit-slider-thumb,
    .pl-vol input:active::-webkit-slider-thumb { transform: scale(1.65); box-shadow: 0 0 0 6px rgba(139,92,246,.18); }
    .pl-vol input::-moz-range-thumb {
      width: 12px; height: 12px; border: 2px solid var(--card-bg); border-radius: 50%;
      background: var(--accent); transition: transform .18s cubic-bezier(.34,1.56,.64,1);
    }
    .pl-vol input:active::-moz-range-thumb,
    .pl-vol input:focus::-moz-range-thumb { transform: scale(1.65); }
    .pl-vol input::-moz-range-track { height: 5px; border-radius: 999px; background: var(--btn-bg); }
    .pl-vol input::-moz-range-progress { height: 5px; border-radius: 999px; background: var(--accent); }

    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(160,224,255,.3);
      border-top-color: #a0e0ff; border-radius: 50%; display: inline-block;
      animation: spin .7s linear infinite; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    /* ============== DIRIGEABLES PUBLICITAIRES (pool + diffusion partagée) ==============
       Les pubs payées sont stockées sur le serveur et diffusées à TOUS les visiteurs.
       On interroge /api/onair toutes les 4 s et on répartit les pubs « à l'antenne »
       sur un pool de dirigeables (jusqu'à MAX_BLIMPS volant en même temps). */
    (function () {
      const template = document.getElementById('blimp');
      if (!template) return;

      // Dépose ton PNG (nez à droite) dans /blimps puis ajoute son nom ici.
      const MY_BLIMPS = ['dirigeable_1_droite.png', 'blimp-3.png', 'blimp-4.png', 'blimp-5.png'];
      const CROSS_SECONDS = 35;
      const MAX_BLIMPS = 3;

      function makeBlimp(index) {
        const el = index === 0 ? template : template.cloneNode(true);
        if (index > 0) { el.removeAttribute('id'); el.classList.add('blimp-unit'); template.parentNode.appendChild(el); }
        el.style.display = 'none';

        const imgEl   = el.querySelector('.blimp-img');
        const media   = el.querySelector('.blimp-media');
        const overlay = el.querySelector('.blimp-video-overlay');
        const videoEl = el.querySelector('.blimp-video-el');
        const craftEl = el.querySelector('.blimp-craft');
        const waveEl  = el.querySelector('.blimp-banner-wave');

        let dir = null, x = 0, flying = false, videoMode = false, adId = null, airStartedAt = null;
        const yBase = 0.16 + index * 0.13;   // étage vertical distinct -> évite les chevauchements
        const yPhase = index * 2.1;

        media.addEventListener('error', () => { if (!videoMode) media.style.display = 'none'; });

        function totalWidth() { return (el.offsetWidth || 440) + 40; }
        function pickRandomBlimp() {
          const file = MY_BLIMPS[Math.floor(Math.random() * MY_BLIMPS.length)];
          imgEl.onload  = () => el.classList.add('has-img');
          imgEl.onerror = () => el.classList.remove('has-img');
          imgEl.src = `blimps/${file}`;
        }
        function setBannerMedia(m) {
          if (!m) {
            videoMode = false; overlay.style.display = 'none';
            try { videoEl.pause(); videoEl.removeAttribute('src'); videoEl.load(); } catch (e) {}
            media.removeAttribute('href'); media.style.display = 'none';
            return;
          }
          if (m.type === 'video') {
            videoMode = true;
            media.removeAttribute('href'); media.style.display = '';   // ancre de position pour l'overlay
            if (videoEl.getAttribute('src') !== m.url) videoEl.src = m.url;
            videoEl.play().catch(() => {});
            overlay.style.display = 'block';
          } else {
            videoMode = false; overlay.style.display = 'none';
            try { videoEl.pause(); } catch (e) {}
            media.setAttribute('href', m.url); media.style.display = '';
          }
        }
        function restartAnims() {
          [craftEl, waveEl].forEach(n => { if (n) n.style.animation = 'none'; });
          void el.offsetWidth;
          [craftEl, waveEl].forEach(n => { if (n) n.style.animation = ''; });
        }
        // Dérive la position et la direction depuis l'horloge murale — fonctionne même
        // si l'onglet était caché (rAF suspendu) car on ne s'appuie plus sur dt.
        function computeState() {
          if (!airStartedAt) return;
          const w = innerWidth;
          const total = totalWidth();
          const elapsed = Math.max(0, (Date.now() - airStartedAt) / 1000);
          const passIndex = Math.floor(elapsed / CROSS_SECONDS);
          const t = (elapsed % CROSS_SECONDS) / CROSS_SECONDS;
          const newDir = (passIndex % 2 === 0) ? -1 : 1;
          if (newDir !== dir) {
            dir = newDir;
            el.classList.toggle('dir-right', dir > 0);
            if (flying) restartAnims();
          }
          x = dir < 0 ? (w + 40) - t * (w + 40 + total) : -total + t * (w + 40 + total);
        }
        function launch() {
          pickRandomBlimp();
          dir = null;
          el.style.display = '';
          flying = true;
          computeState();
        }
        return {
          get adId() { return adId; },
          assign(ad) { adId = ad.id; airStartedAt = ad.airStartedAt; setBannerMedia({ type: ad.type, url: ad.url }); launch(); },
          stop() { adId = null; airStartedAt = null; flying = false; el.style.display = 'none'; setBannerMedia(null); },
          step(now, dt) {
            if (!flying) return;
            computeState();
            const y = innerHeight * yBase + Math.sin(now / 1000 + yPhase) * 12 + Math.sin(now / 1700 + yPhase + 1) * 6;
            el.style.transform = `translate(${x}px, ${y}px)`;
          },
        };
      }

      const pool = [];
      for (let i = 0; i < MAX_BLIMPS; i++) pool.push(makeBlimp(i));

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.05, (now - last) / 1000); last = now;
        for (const b of pool) b.step(now, dt);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // Répartit les pubs « à l'antenne » (du serveur) sur les dirigeables libres.
      function reconcile(onAir) {
        const ids = new Set(onAir.map(a => a.id));
        for (const b of pool) if (b.adId && !ids.has(b.adId)) b.stop();
        for (const ad of onAir) {
          if (pool.some(b => b.adId === ad.id)) continue;
          const free = pool.find(b => !b.adId);
          if (free) free.assign(ad);
        }
      }
      async function poll() {
        try {
          const r = await fetch('/api/onair', { cache: 'no-store' });
          const data = await r.json();
          reconcile(Array.isArray(data.ads) ? data.ads : []);
        } catch (e) {}
      }
      poll();
      setInterval(poll, 4000);
    })();

    /* ============== MODALE PUB (offres + canvas créatif) ============== */
    (function () {
      /* --- Précompile le clipPath du drapeau en coords objectBoundingBox 0–1.
         (Le <g transform="..."> imbriqué dans un clipPath objectBoundingBox n'est pas
         honoré par tous les moteurs, donc on applique la matrice à la main au path d.) */
      (function precompileFlagClipPath() {
        // Path d'origine (déjà présent dans le SVG outline visible) :
        const D = document.querySelector('.ad-banner-outline path').getAttribute('d');
        // Matrice : x_norm = x_path/5850 - 225/585 ; y_norm = -y_path/3220 + 331/322
        // (flag bbox = x ∈ [225, 810], y ∈ [40, 362] — 225 = début réel du drapeau, après le pole)
        const SX = 1 / 5850, SY = -1 / 3220, TX = -225 / 585, TY = 331 / 322;
        const tokens = D.match(/[MmLlHhVvCcSsQqTtAaZz]|-?\d*\.?\d+(?:[eE][-+]?\d+)?/g);
        const fmt = n => (Math.round(n * 1e6) / 1e6).toString();
        const isNum = t => /^[-.\d]/.test(t);
        const paramCount = { m:2, l:2, h:1, v:1, c:6, s:4, q:4, t:2, a:7 };
        const out = [];
        let i = 0;
        while (i < tokens.length) {
          const cmd = tokens[i++];
          if (cmd.toLowerCase() === 'z') { out.push(cmd); continue; }
          const lc = cmd.toLowerCase();
          const n = paramCount[lc];
          const absolute = cmd === cmd.toUpperCase();
          out.push(cmd);
          let first = true;
          while (i < tokens.length && isNum(tokens[i])) {
            const p = [];
            for (let k = 0; k < n; k++) p.push(parseFloat(tokens[i++]));
            // Pour M/m, les groupes suivants sont implicitement L/l
            const effLc = (!first && (lc === 'm')) ? 'l' : lc;
            const useAbs = absolute && (first || lc !== 'm' || true); // pour 'M' multi-pair: absolute, pour 'm': relative
            // Simplification : on traite chaque groupe avec la "case" du cmd ; pour notre path
            // les groupes multiples n'existent que pour 'c' (relatif), donc OK.
            if (effLc === 'h') {
              p[0] = useAbs ? p[0] * SX + TX : p[0] * SX;
            } else if (effLc === 'v') {
              p[0] = useAbs ? p[0] * SY + TY : p[0] * SY;
            } else if (effLc === 'a') {
              p[0] = Math.abs(p[0] * SX);
              p[1] = Math.abs(p[1] * SY);
              p[5] = useAbs ? p[5] * SX + TX : p[5] * SX;
              p[6] = useAbs ? p[6] * SY + TY : p[6] * SY;
            } else {
              for (let k = 0; k + 1 < p.length; k += 2) {
                p[k]   = useAbs ? p[k]   * SX + TX : p[k]   * SX;
                p[k+1] = useAbs ? p[k+1] * SY + TY : p[k+1] * SY;
              }
            }
            out.push(p.map(fmt).join(' '));
            first = false;
          }
        }
        document.getElementById('adFlagClipPath').setAttribute('d', out.join(' '));
      })();

      /* ===== Stockage vidéo (IndexedDB) : survit à la redirection Stripe ===== */
      function idbVideo(action, blob) {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('wavemap', 1);
          req.onupgradeneeded = () => req.result.createObjectStore('media');
          req.onerror = () => reject(req.error);
          req.onsuccess = () => {
            const db = req.result;
            const tx = db.transaction('media', 'readwrite');
            const store = tx.objectStore('media');
            const op = action === 'put' ? store.put(blob, 'pendingVideo')
                     : action === 'del' ? store.delete('pendingVideo')
                     : store.get('pendingVideo');
            op.onsuccess = () => resolve(op.result);
            op.onerror = () => reject(op.error);
            tx.oncomplete = () => db.close();
          };
        });
      }

      /* ===== Mode vidéo (aperçu + bascule des outils) ===== */
      function setDrawToolsDisabled(on) {
        [toolPen, toolEraser].forEach(b => { if (b) b.disabled = on; });
        const colorBtn = document.getElementById('adColorBtn');
        if (colorBtn) colorBtn.disabled = on;
        sizeEl.disabled = on;

        if (sizeWrap) sizeWrap.classList.toggle('is-disabled', on);
      }
      function enterVideoMode(blob) {
        // une vidéo remplace tout dessin/image
        drawCtx.clearRect(0, 0, drawLayer.width, drawLayer.height);
        imgCtx.clearRect(0, 0, imgLayer.width, imgLayer.height);
        userImg = null; hasDrawing = false; imgT = { x: 0, y: 0, scale: 1 };
        toolImage.disabled = true;
        userVideo = blob;
        if (videoURL) URL.revokeObjectURL(videoURL);
        videoURL = URL.createObjectURL(blob);
        videoPreview.src = videoURL;
        videoPreview.play().catch(() => {});
        stack.classList.add('mode-video');
        setDrawToolsDisabled(true);
        updateLaunch();
      }
      function exitVideoMode() {
        userVideo = null;
        if (videoURL) { URL.revokeObjectURL(videoURL); videoURL = null; }
        try { videoPreview.pause(); videoPreview.removeAttribute('src'); videoPreview.load(); } catch (e) {}
        stack.classList.remove('mode-video');
        setDrawToolsDisabled(false);
      }

      // Extrait quelques images de la vidéo (pour la modération)
      function extractFrames(blob, times) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(blob);
          const v = document.createElement('video');
          v.muted = true; v.preload = 'auto'; v.src = url;
          const frames = [];
          const c = document.createElement('canvas');
          const ctx = c.getContext('2d');
          let i = 0, dur = 1;
          const done = (err) => { URL.revokeObjectURL(url); err ? reject(err) : resolve(frames); };
          v.onloadeddata = () => {
            dur = (v.duration && isFinite(v.duration)) ? v.duration : 1;
            const W = 480;
            c.width = W;
            c.height = Math.round(W * ((v.videoHeight || 9) / (v.videoWidth || 16)));
            seekNext();
          };
          function seekNext() {
            if (i >= times.length) return done();
            v.currentTime = Math.min(dur * times[i], Math.max(0, dur - 0.05));
          }
          v.onseeked = () => {
            try { ctx.drawImage(v, 0, 0, c.width, c.height); frames.push(c.toDataURL('image/jpeg', 0.85)); }
            catch (e) {}
            i++; seekNext();
          };
          v.onerror = () => done(new Error('Vidéo illisible'));
        });
      }

      function setTool(t) {

      function redrawImg() {
        imgCtx.clearRect(0, 0, imgLayer.width, imgLayer.height);
        if (!userImg) return;
        // baseline = cover (remplit la banderole), puis on applique la transform user
        const base = Math.max(imgLayer.width / userImg.naturalWidth,
                              imgLayer.height / userImg.naturalHeight);
        const s = base * imgT.scale;
        const w = userImg.naturalWidth * s;
        const h = userImg.naturalHeight * s;
        const x = (imgLayer.width  - w) / 2 + imgT.x;
        const y = (imgLayer.height - h) / 2 + imgT.y;
        imgCtx.drawImage(userImg, x, y, w, h);
      }

      fileEl.addEventListener('change', () => {

      function eventPos(e) {
        const r = events.getBoundingClientRect();
        return [
          (e.clientX - r.left) * drawLayer.width  / r.width,
          (e.clientY - r.top)  * drawLayer.height / r.height
        ];
      }

      let drag = null;
      let lastX = 0, lastY = 0, lastMidX = 0, lastMidY = 0;

      events.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        events.setPointerCapture(e.pointerId);
        if (tool === 'image' && userImg) {
          drag = { mode: 'image', sx: e.clientX, sy: e.clientY, bx: imgT.x, by: imgT.y };
          return;
        }
        drag = { mode: 'draw' };
        const [x, y] = eventPos(e);
        lastX = x; lastY = y; lastMidX = x; lastMidY = y;
        drawCtx.globalCompositeOperation = (tool === 'eraser') ? 'destination-out' : 'source-over';
        drawCtx.fillStyle = color;
        drawCtx.beginPath();
        drawCtx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
        drawCtx.fill();
        hasDrawing = true;
        updateLaunch();
      });

      events.addEventListener('pointermove', (e) => {
        if (!drag) return;
        if (drag.mode === 'image') {
          const r = events.getBoundingClientRect();
          const sx = drawLayer.width / r.width;
          imgT.x = drag.bx + (e.clientX - drag.sx) * sx;
          imgT.y = drag.by + (e.clientY - drag.sy) * sx;
          redrawImg();
          return;
        }
        const [x, y] = eventPos(e);
        const midX = (lastX + x) / 2;
        const midY = (lastY + y) / 2;
        drawCtx.globalCompositeOperation = (tool === 'eraser') ? 'destination-out' : 'source-over';
        drawCtx.strokeStyle = color;
        drawCtx.lineWidth = brushSize;
        drawCtx.beginPath();
        drawCtx.moveTo(lastMidX, lastMidY);
        drawCtx.quadraticCurveTo(lastX, lastY, midX, midY);
        drawCtx.stroke();
        lastMidX = midX; lastMidY = midY;
        lastX = x; lastY = y;
      });

      const endDrag = () => { drag = null; };
      events.addEventListener('pointerup', endDrag);
      events.addEventListener('pointercancel', endDrag);
      events.addEventListener('pointerleave', endDrag);

      events.addEventListener('wheel', (e) => {
        if (tool !== 'image' || !userImg) return;
        e.preventDefault();
        const factor = Math.exp(-e.deltaY * 0.0015);
        imgT.scale = Math.max(0.25, Math.min(6, imgT.scale * factor));
        redrawImg();
      }, { passive: false });

      clearBtn.addEventListener('click', () => {

      function hasContent() { return !!userImg || hasDrawing || !!userVideo; }
      function updateLaunch() {

      function exportComposite() {

        ctx.fillRect(0, 0, c.width, c.height);
        ctx.drawImage(imgLayer, 0, 0);
        ctx.drawImage(drawLayer, 0, 0);
        return c.toDataURL('image/png');
      }

      // Upload du média (image/vidéo) sur le serveur -> { mediaId, url, type }
      async function uploadMedia(fileOrBlob, fallbackName) {
        const fd = new FormData();
        fd.append('media', fileOrBlob, (fileOrBlob && fileOrBlob.name) || fallbackName);
        const r = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok || !data.mediaId) throw new Error(data.message || "Échec de l'envoi du média");

      // Petite notification flottante (confirmation de paiement / file)

        t.style.cssText = 'position:fixed;top:78px;left:50%;transform:translateX(-50%);z-index:200;' +
          'background:var(--card-bg);color:var(--text);border:1px solid var(--card-border);border-radius:14px;' +
          'padding:14px 20px;box-shadow:0 14px 34px rgba(0,0,0,.2);font-size:14px;font-weight:600;' +
          'max-width:90vw;text-align:center;line-height:1.4';

        setTimeout(() => { t.style.transition = 'opacity .5s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 6500);
